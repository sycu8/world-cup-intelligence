# GitHub Actions deploy — token ONLY in repo Secrets (Settings → Secrets → Actions)
# Name: CLOUDFLARE_API_TOKEN
name: Deploy Cloudflare

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        default: uat
        type: choice
        options:
          - uat
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Apply D1 migrations (UAT)
        if: inputs.target == 'uat'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run db:migrate:uat

      - name: Deploy UAT
        if: inputs.target == 'uat'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy:uat

      - name: Apply D1 migrations (Production)
        if: inputs.target == 'production'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run db:migrate:production

      - name: Deploy Production
        if: inputs.target == 'production'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy:production
