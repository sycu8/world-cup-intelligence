# GitHub Actions deploy — token ONLY in repo Secrets (Settings → Secrets → Actions)
# Name: CLOUDFLARE_API_TOKEN
name: Deploy Cloudflare

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        default: both
        type: choice
        options:
          - uat
          - production
          - both
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Resolve deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=both" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install
        run: npm ci

      - name: Apply D1 migrations (UAT)
        if: steps.target.outputs.value == 'uat' || steps.target.outputs.value == 'both'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run db:migrate:uat

      - name: Deploy UAT
        if: steps.target.outputs.value == 'uat' || steps.target.outputs.value == 'both'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy:uat

      - name: Apply D1 migrations (Production)
        if: steps.target.outputs.value == 'production' || steps.target.outputs.value == 'both'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run db:migrate:production

      - name: Deploy Production
        if: steps.target.outputs.value == 'production' || steps.target.outputs.value == 'both'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy:production
